<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天枢智治平台 (AegisFlow Intelligence Platform) - Web UI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background-color: #f5f5f5;
        color: #333;
      }
      
      #root {
        min-height: 100vh;
      }
      
      .loading-screen {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        color: white;
      }
      
      .loading-screen h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        text-align: center;
      }
      
      .loading-screen p {
        font-size: 1.1rem;
        opacity: 0.9;
        margin-bottom: 2rem;
        text-align: center;
        max-width: 600px;
        line-height: 1.6;
      }
      
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 2rem;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .status-info {
        background-color: rgba(255, 255, 255, 0.1);
        padding: 1rem 1.5rem;
        border-radius: 8px;
        margin-top: 1rem;
        text-align: center;
      }
      
      .status-info div {
        margin-bottom: 0.5rem;
      }
      
      .status-info .api-status {
        font-weight: bold;
      }
      
      .status-info .api-status.healthy {
        color: #2ecc71;
      }
      
      .status-info .api-status.unhealthy {
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen shown while React loads -->
      <div class="loading-screen">
        <div class="spinner"></div>
        <h1>天枢智治平台 (AIP)</h1>
        <p>Loading AegisFlow Intelligence Platform Web UI...</p>
        <div class="status-info">
          <div>Frontend: <strong>http://localhost:5173</strong></div>
          <div>Backend API: <strong>http://localhost:8787</strong></div>
          <div>API Status: <span class="api-status" id="initial-api-status">Checking...</span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      // Check API status on page load
      document.addEventListener('DOMContentLoaded', function() {
        const apiStatusElement = document.getElementById('initial-api-status');
        
        fetch('/api/health')
          .then(response => response.json())
          .then(data => {
            if (data.ok) {
              apiStatusElement.textContent = 'Healthy ✓';
              apiStatusElement.className = 'api-status healthy';
            } else {
              apiStatusElement.textContent = 'Unhealthy ✗';
              apiStatusElement.className = 'api-status unhealthy';
            }
          })
          .catch(error => {
            apiStatusElement.textContent = 'Unreachable ✗';
            apiStatusElement.className = 'api-status unhealthy';
          });
      });
    </script>
  </body>
</html>
