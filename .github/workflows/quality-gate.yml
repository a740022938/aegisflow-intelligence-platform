name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --dir apps/local-api typecheck

      - name: Lint
        run: pnpm lint

      - name: Init DB (migration-first)
        run: pnpm run db:init

      - name: DB Doctor Strict
        run: pnpm run db:doctor:strict

